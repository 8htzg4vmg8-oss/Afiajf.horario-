<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AFIA - Ordem de Serviço</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f2f2f7;
      color: #1d1d1f;
    }
    .container { max-width: 520px; margin: 0 auto; }
    .header { text-align: center; margin: 18px 0; }
    .header h1 { margin: 0; font-size: 34px; letter-spacing: 2px; }
    .header p { margin: 6px 0 0; font-size: 12px; color: #777; font-weight: 700; letter-spacing: 1px; }
    .cloud {
      background: #fff;
      border-radius: 14px;
      padding: 13px;
      margin-bottom: 12px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .ok { color: #20a34a; }
    .bad { color: #ff3b30; }
    .tabs {
      display: flex;
      gap: 5px;
      background: #e5e5ea;
      padding: 5px;
      border-radius: 14px;
      margin-bottom: 12px;
    }
    .tabs button {
      flex: 1;
      border: 0;
      background: transparent;
      padding: 11px 4px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      color: #333;
    }
    .tabs button.active { background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,.12); }
    .stats { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat {
      flex: 1;
      background: #fff;
      padding: 13px 4px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      font-size: 12px;
      color: #777;
      font-weight: 700;
    }
    .stat b { display: block; color: #111; font-size: 22px; margin-bottom: 3px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .title {
      margin: 0 0 12px;
      color: #007aff;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    label { display: block; font-size: 13px; font-weight: 700; margin: 10px 0 5px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d2d2d7;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      background: #fff;
      font-family: inherit;
    }
    textarea { min-height: 70px; resize: vertical; }
    .row { display: flex; gap: 8px; }
    .row > div { flex: 1; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      background: #34c759;
    }
    .btn-blue { background: #007aff; }
    .btn-red { background: #ff3b30; }
    .hidden { display: none; }
    .os-card { border-left: 5px solid #007aff; }
    .os-card p { margin: 5px 0; font-size: 14px; }
    .small { color: #777; font-size: 13px; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>AFIA</h1>
      <p>ORDEM DE SERVIÇO • AGENDA • CLIENTES</p>
    </div>

    <div class="cloud" id="cloudStatus">Conectando ao Firebase...</div>

    <div class="tabs">
      <button id="btnAgenda" class="active" onclick="showTab('agenda')">📅 Agenda</button>
      <button id="btnNova" onclick="showTab('nova')">📝 Nova OS</button>
      <button id="btnClientes" onclick="showTab('clientes')">🔎 Clientes</button>
      <button id="btnAjustes" onclick="showTab('ajustes')">⚙️ Ajustes</button>
    </div>

    <div class="stats">
      <div class="stat"><b id="statPedidos">0</b>Pedidos</div>
      <div class="stat"><b id="statPecas">0</b>Peças</div>
      <div class="stat"><b id="statValor">R$ 0,00</b>Faturamento</div>
    </div>

    <section id="agenda">
      <div class="card">
        <h3 class="title">📅 Agenda</h3>
        <label>Data da agenda</label>
        <input type="date" id="agendaData" onchange="renderAgenda()">
      </div>
      <div id="agendaLista"></div>
    </section>

    <section id="nova" class="hidden">
      <form class="card" onsubmit="salvarOS(event)">
        <h3 class="title">📝 Nova Ordem de Serviço</h3>

        <label>Nome do cliente</label>
        <input id="nome" required>

        <label>Telefone / WhatsApp</label>
        <input id="telefone" inputmode="tel" required>

        <div class="row">
          <div>
            <label>Data da entrega</label>
            <input type="date" id="dataEntrega" required>
          </div>
          <div>
            <label>Horário</label>
            <select id="horaEntrega" required></select>
          </div>
        </div>

        <label>Alicates de cutícula</label>
        <input type="number" id="qtdAlicates" min="0" value="0" oninput="calcularTotal()">

        <label>Facas</label>
        <input type="number" id="qtdFacas" min="0" value="0" oninput="calcularTotal()">

        <label>Tesouras</label>
        <input type="number" id="qtdTesouras" min="0" value="0" oninput="calcularTotal()">

        <label>Molas</label>
        <input type="number" id="qtdMolas" min="0" value="0" oninput="calcularTotal()">

        <label>Espátulas</label>
        <input type="number" id="qtdEspatulas" min="0" value="0" oninput="calcularTotal()">

        <label>Outros serviços</label>
        <input type="number" id="qtdOutros" min="0" value="0" oninput="calcularTotal()">

        <label>Observação</label>
        <textarea id="observacao" placeholder="Ex: ponta quebrada, trocar mola, alicate Staleks..."></textarea>

        <label>Status de produção</label>
        <select id="status">
          <option value="Recebido">📦 Recebido / aguardando</option>
          <option value="Na bancada">🔥 Na bancada</option>
          <option value="Pronto">🟢 Pronto para retirada</option>
          <option value="Retirado">✅ Retirado</option>
        </select>

        <label>Pagamento</label>
        <select id="pagamento">
          <option value="Pagar na retirada">🔴 Pagar na retirada</option>
          <option value="Pago">🟢 Pago</option>
        </select>

        <label>Valor total</label>
        <input type="number" id="valorTotal" step="0.01" required>

        <button class="btn" type="submit">💾 Salvar OS na nuvem</button>
      </form>
    </section>

    <section id="clientes" class="hidden">
      <div class="card">
        <h3 class="title">🔎 Clientes</h3>
        <label>Pesquisar por nome ou telefone</label>
        <input id="buscaCliente" oninput="renderClientes()">
      </div>
      <div id="clientesLista"></div>
    </section>

    <section id="ajustes" class="hidden">
      <div class="card">
        <h3 class="title">⚙️ Ajustes</h3>
        <p><b>Status:</b> <span id="ajusteStatus">Verificando...</span></p>
        <p class="small">Este app salva as OS na coleção <b>ordens_afia</b> do Firestore.</p>
      </div>
    </section>
  </div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCXY6zQ6K-roWFFNBCU--LF5enWpVCoLpc",
    authDomain: "afia-37aa8.firebaseapp.com",
    databaseURL: "https://afia-37aa8-default-rtdb.firebaseio.com",
    projectId: "afia-37aa8",
    storageBucket: "afia-37aa8.firebasestorage.app",
    messagingSenderId: "961300018208",
    appId: "1:961300018208:web:3ee1ebf3020f3cd72fb845"
  };

  let db = null;
  let ordens = [];
  const colecao = "ordens_afia";

  const precos = {
    alicates: 10,
    facas: 12,
    tesouras: 15,
    molas: 5,
    espatulas: 7,
    outros: 10
  };

  function hojeISO() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  function dataBR(iso) {
    if (!iso) return "";
    const p = iso.split("-");
    return p[2] + "/" + p[1] + "/" + p[0];
  }

  function dinheiro(v) {
    return "R$ " + Number(v || 0).toFixed(2).replace(".", ",");
  }

  function iniciar() {
    document.getElementById("agendaData").value = hojeISO();
    document.getElementById("dataEntrega").value = hojeISO();

    const horarios = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","12:30","13:00","14:30","15:00","15:30","16:00","16:30"];
    horarios.forEach(h => {
      const opt = document.createElement("option");
      opt.value = h;
      opt.textContent = h;
      document.getElementById("horaEntrega").appendChild(opt);
    });

    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      document.getElementById("cloudStatus").innerHTML = '<span class="ok">🟢 Conectado na nuvem Firebase</span>';
      document.getElementById("ajusteStatus").innerHTML = '<span class="ok">Conectado na nuvem Firebase</span>';

      db.collection(colecao).orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        ordens = [];
        snapshot.forEach(doc => {
          ordens.push({ id: doc.id, ...doc.data() });
        });
        renderAgenda();
        renderClientes();
      }, erro => {
        document.getElementById("cloudStatus").innerHTML = '<span class="bad">🔴 Erro no Firebase: ' + erro.message + '</span>';
        document.getElementById("ajusteStatus").innerHTML = '<span class="bad">' + erro.message + '</span>';
      });
    } catch (erro) {
      document.getElementById("cloudStatus").innerHTML = '<span class="bad">🔴 Erro ao conectar: ' + erro.message + '</span>';
      document.getElementById("ajusteStatus").innerHTML = '<span class="bad">' + erro.message + '</span>';
    }
  }

  function showTab(tab) {
    ["agenda", "nova", "clientes", "ajustes"].forEach(id => document.getElementById(id).classList.add("hidden"));
    ["btnAgenda", "btnNova", "btnClientes", "btnAjustes"].forEach(id => document.getElementById(id).classList.remove("active"));

    document.getElementById(tab).classList.remove("hidden");

    if (tab === "agenda") document.getElementById("btnAgenda").classList.add("active");
    if (tab === "nova") document.getElementById("btnNova").classList.add("active");
    if (tab === "clientes") document.getElementById("btnClientes").classList.add("active");
    if (tab === "ajustes") document.getElementById("btnAjustes").classList.add("active");
  }

  function calcularTotal() {
    const total =
      (Number(document.getElementById("qtdAlicates").value) || 0) * precos.alicates +
      (Number(document.getElementById("qtdFacas").value) || 0) * precos.facas +
      (Number(document.getElementById("qtdTesouras").value) || 0) * precos.tesouras +
      (Number(document.getElementById("qtdMolas").value) || 0) * precos.molas +
      (Number(document.getElementById("qtdEspatulas").value) || 0) * precos.espatulas +
      (Number(document.getElementById("qtdOutros").value) || 0) * precos.outros;

    document.getElementById("valorTotal").value = total.toFixed(2);
  }

  async function salvarOS(event) {
    event.preventDefault();

    if (!db) {
      alert("Firebase não está conectado. Veja a aba Ajustes.");
      return;
    }

    const itens = {
      "Alicates": Number(document.getElementById("qtdAlicates").value) || 0,
      "Facas": Number(document.getElementById("qtdFacas").value) || 0,
      "Tesouras": Number(document.getElementById("qtdTesouras").value) || 0,
      "Molas": Number(document.getElementById("qtdMolas").value) || 0,
      "Espátulas": Number(document.getElementById("qtdEspatulas").value) || 0,
      "Outros": Number(document.getElementById("qtdOutros").value) || 0
    };

    const pecas = Object.values(itens).reduce((soma, qtd) => soma + qtd, 0);

    if (pecas === 0) {
      alert("Marque pelo menos 1 serviço.");
      return;
    }

    const os = {
      nome: document.getElementById("nome").value.trim(),
      telefone: document.getElementById("telefone").value.trim(),
      data: document.getElementById("dataEntrega").value,
      hora: document.getElementById("horaEntrega").value,
      itens: itens,
      pecas: pecas,
      observacao: document.getElementById("observacao").value.trim(),
      status: document.getElementById("status").value,
      pagamento: document.getElementById("pagamento").value,
      valor: Number(document.getElementById("valorTotal").value || 0),
      criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    };

    try {
      await db.collection(colecao).add(os);

      let tel = os.telefone.replace(/\D/g, "");
      if (!tel.startsWith("55")) tel = "55" + tel;

      const itensTexto = Object.entries(itens)
        .filter(([nome, qtd]) => qtd > 0)
        .map(([nome, qtd]) => nome + ": " + qtd)
        .join("%0A");

      const mensagem =
        "*AFIA - ORDEM DE SERVIÇO*%0A%0A" +
        "Olá, *" + os.nome + "*!%0A" +
        "Sua ordem de serviço foi registrada.%0A%0A" +
        "📅 Entrega: " + dataBR(os.data) + "%0A" +
        "⏰ Horário: " + os.hora + "%0A%0A" +
        "*Serviços:*%0A" + itensTexto + "%0A%0A" +
        "💰 Total: " + dinheiro(os.valor) + "%0A" +
        "📌 Pagamento: " + os.pagamento;

      window.open("https://wa.me/" + tel + "?text=" + mensagem, "_blank");

      event.target.reset();
      document.getElementById("dataEntrega").value = hojeISO();
      showTab("agenda");
    } catch (erro) {
      alert("Erro ao salvar no Firebase: " + erro.message);
    }
  }

  function renderAgenda() {
    const data = document.getElementById("agendaData").value;
    const lista = ordens
      .filter(os => os.data === data)
      .sort((a, b) => String(a.hora || "").localeCompare(String(b.hora || "")));

    document.getElementById("statPedidos").textContent = lista.length;
    document.getElementById("statPecas").textContent = lista.reduce((soma, os) => soma + Number(os.pecas || 0), 0);
    document.getElementById("statValor").textContent = dinheiro(lista.reduce((soma, os) => soma + Number(os.valor || 0), 0));

    const box = document.getElementById("agendaLista");
    box.innerHTML = "";

    if (lista.length === 0) {
      box.innerHTML = '<div class="card small">Nenhuma OS para essa data.</div>';
      return;
    }

    lista.forEach(os => {
      const itens = Object.entries(os.itens || {})
        .filter(([nome, qtd]) => qtd > 0)
        .map(([nome, qtd]) => nome + ": " + qtd)
        .join(" • ");

      const div = document.createElement("div");
      div.className = "card os-card";
      div.innerHTML = `
        <p><b>${os.hora} - ${os.nome}</b></p>
        <p>📞 ${os.telefone}</p>
        <p>${itens}</p>
        <p>💰 ${dinheiro(os.valor)} | ${os.pagamento}</p>
        <p>📌 Status: <b>${os.status}</b></p>
        ${os.observacao ? `<p>📝 ${os.observacao}</p>` : ""}
        <button class="btn btn-blue" onclick="marcarPronto('${os.id}')">Marcar como pronto</button>
        <button class="btn btn-red" onclick="apagarOS('${os.id}')">Apagar OS</button>
      `;
      box.appendChild(div);
    });
  }

  function renderClientes() {
    const busca = document.getElementById("buscaCliente").value.toLowerCase().trim();
    const lista = ordens.filter(os =>
      !busca ||
      String(os.nome || "").toLowerCase().includes(busca) ||
      String(os.telefone || "").includes(busca)
    );

    const box = document.getElementById("clientesLista");
    box.innerHTML = "";

    if (lista.length === 0) {
      box.innerHTML = '<div class="card small">Nenhum cliente encontrado.</div>';
      return;
    }

    lista.forEach(os => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <p><b>${os.nome}</b></p>
        <p>📞 ${os.telefone}</p>
        <p>📅 ${dataBR(os.data)} às ${os.hora}</p>
        <p>💰 ${dinheiro(os.valor)} | ${os.status}</p>
      `;
      box.appendChild(div);
    });
  }

  async function marcarPronto(id) {
    await db.collection(colecao).doc(id).update({ status: "Pronto" });
  }

  async function apagarOS(id) {
    if (confirm("Deseja apagar esta OS?")) {
      await db.collection(colecao).doc(id).delete();
    }
  }

  iniciar();
</script>
</body>
</html>
